# ferawm.conf — FeraWM Configuration File
# Location: ~/.config/fera/ferawm.conf
# Lines starting with # are comments
# Variables start with $ and can be used anywhere after definition

# ── Variables ─────────────────────────────────────────
$m = super     # main modifier key
$s = shift     # shift key alias
$c = ctrl      # ctrl key alias

# ── General ───────────────────────────────────────────
general {
    bone_color   = 7c6af7   # focused bone border color (hex, no 0x)
    bone_unfocus = 2a2a3a   # unfocused bone border color (hex, no 0x)
    bone_gap     = 20        # gap from screen edges (pixels)
    inner_gap    = 10        # gap between tiled windows (pixels)
    border_size  = 4 4       # bone border padding: X Y (pixels)
    tile_mode    = 0         # start in tiling mode: 0=off 1=on
    mouse_focus  = false     # focus follows mouse + cursor warps on keyboard focus
    animate_tab  = 1         # 0=snap  1=live  2=ghost  3=pixel
}

# ── Input ─────────────────────────────────────────────
input {
    modifier    = super          # main modifier: super alt ctrl shift
    xkb_layout  = us             # keyboard layout
    xkb_options = ctrl:nocaps    # xkb options (empty = none)

    mouse {
        natural_scroll = false   # reverse scroll direction
        sensitivity    = 0.0     # pointer speed (-1.0 to 1.0)
        accel_profile  = flat    # flat or adaptive
    }

    touchpad {
        natural_scroll = true    # reverse scroll direction
        sensitivity    = 0.5     # pointer speed (-1.0 to 1.0)
        accel_profile  = flat    # flat or adaptive
    }
}

# ── Autostart ─────────────────────────────────────────
# once    — spawn on startup only if not already running
# restart — pkill + respawn on every ferawm restart
autostart {
    once    = steam -silent, vesktop
    restart = picom, feh --bg-scale ~/Pictures/wallpapers/background.jpg
}

# ── Keybinds ──────────────────────────────────────────
# Format: keybind = <combo> = <action>
# Format: keybind = <combo> = spawn = <command>
# Format: keybind = <combo> = ws_switch = <1-4>
# Format: keybind = <combo> = ws_move   = <1-4>
# Modifiers: modifier, shift, ctrl, alt, super

keybind = $m+q       = kill_window      # close focused window
keybind = $m+$s+q    = kill_wm          # exit ferawm
keybind = $m+f       = fullscreen       # toggle fullscreen
keybind = $m+tab     = cycle_focus      # cycle focus forward
keybind = $m+$s+r    = reload           # reload config (hot reload)
keybind = $m+$s+e    = restart          # full restart (reruns autostart_restart)

# tiling
keybind = $m+t       = tile_toggle      # toggle tiling mode on/off
keybind = $m+$s+f    = tile_float       # toggle focused window float/tile

# tile move — swap window position in grid
keybind = $m+$s+left  = tile_left
keybind = $m+$s+right = tile_right
keybind = $m+$s+up    = tile_up
keybind = $m+$s+down  = tile_down

# focus move — move focus without swapping
keybind = $m+left  = focus_left
keybind = $m+right = focus_right
keybind = $m+up    = focus_up
keybind = $m+down  = focus_down

# spawn
keybind = $m+return  = spawn = kitty
keybind = $m+r       = spawn = rofi -show drun

# screenshots
keybind = $m+p    = spawn = bash -c 'f=~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && maim "$f" && xclip -selection clipboard -t image/png < "$f"'
keybind = $m+$s+p = spawn = bash -c 'f=~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && maim -s "$f" && xclip -selection clipboard -t image/png < "$f"'

# workspaces — switch
keybind = $m+1  = ws_switch = 1
keybind = $m+2  = ws_switch = 2
keybind = $m+3  = ws_switch = 3
keybind = $m+4  = ws_switch = 4

# workspaces — move focused window
keybind = $m+$s+1  = ws_move = 1
keybind = $m+$s+2  = ws_move = 2
keybind = $m+$s+3  = ws_move = 3
keybind = $m+$s+4  = ws_move = 4
